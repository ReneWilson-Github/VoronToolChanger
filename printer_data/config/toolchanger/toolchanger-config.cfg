# THIS IS NOT AN EXHAUSTIVE LIST!
# use this file to override values in the other configs. 
# any value that is available in the configs can be overriden here
# just add the section ie: [tool_probe T0] and the value that is being overridden.  
# this file must be the last file to be included since values will be stored in the order they are
# received.  Klipper will take the last value and store that for the macros. 

[rounded_path]
resolution: 0.2
replace_g0: False

[force_move]
enable_force_move: True

# ============================
#  Toolchanger Global Settings
# ============================
[toolchanger]
params_pickup_path: [{'y':30,'z':-15},{'y':0,'z':-15},{'y':-8.0,'z':-15,'f':0.4},{'y':-8.0,'z':-10.5},{'y':-8.0,'z':-1},{'y':16,'z':-1}]
params_dropoff_path: [{'y':10,'z':4},{'y':0,'z':0},{'y':-8.5,'z':-15,'f':0.5},{'y':-8.5,'z':-15},{'y':30,'z':-15}]
params_safe_y: 120
params_close_y: 25
params_fast_speed: 10000
params_path_speed: 3000
require_tool_present: False

# ============================
#  Toolchanger SexBall
# ============================
[gcode_macro _CALIBRATION_SWITCH]
variable_x: 201.8
variable_y: 0
variable_z: 14.5
gcode:

[tools_calibrate]
pin: ^!PG10
travel_speed: 20
spread: 7
lower_z: 1.0
speed: 2
lift_speed: 4
final_lift_z: 6
sample_retract_dist: 2
samples_tolerance: 0.05
samples: 3
samples_result: median
probe: probe
trigger_to_bottom_z: 1.1

# ============================
#  Tool Includes
#  Add T1-T4 one at a time after each is validated
# ============================
[include tools/T0.cfg]
[include tools/T1.cfg]
[include tools/T2.cfg]
[include tools/T3.cfg]
[include tools/T4.cfg]

# ============================
#  Sensorless Homing Config
# ============================
[gcode_macro homing_override_config]
variable_sensorless_x: True
variable_sensorless_y: True
variable_homing_rebound_y: 20
variable_stepper_driver: "tmc2209"
variable_homing_current: 0.49
gcode:

[gcode_macro M106]
rename_existing: M106.1
gcode:
    {% set tn = "T" ~ printer.toolchanger.tool_number|string %}
    {% set max_power = printer["gcode_macro " + tn].max_fan_power|float %}
    {% set fan = printer[printer.toolchanger.tool_names[printer.toolchanger.tool_number]].fan %}
    {% if fan %}
        {% set speed = [params.S|default(255)|int / 255, max_power]|min %}
        SET_FAN_SPEED FAN={fan} SPEED={speed}
    {% endif %}
    
[gcode_macro M107]
rename_existing: M107.1
gcode:
    {% set tool = printer.toolchanger.tool_names[printer.toolchanger.tool_number] %}
    {% set fan = printer[tool].fan %}
    {% if fan %}
        SET_FAN_SPEED FAN={fan} SPEED=0
    {% endif %}