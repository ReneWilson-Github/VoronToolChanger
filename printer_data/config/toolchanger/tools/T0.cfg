# ============================
#  T0 - RP2040 / Nitehawk36
# ============================

[mcu tool0]
serial: /dev/serial/by-id/usb-Klipper_rp2040_323232323619787C-if00
restart_method: command

[gcode_macro T0]
variable_active: 0
variable_color: ""
variable_max_fan_power: 1.0
gcode:
    SELECT_TOOL T=0

[tool T0]
tool_number: 0
detection_pin: !tool0:gpio10
extruder: extruder
fan: T0_partfan
gcode_x_offset: 0
gcode_y_offset: 0
gcode_z_offset: 0
params_park_x: 292.4
params_park_y: 1.5
params_park_z: 252
params_input_shaper_type_x: '3hump_ei'
params_input_shaper_freq_x: 88.8
params_input_shaper_damping_ratio_x: 0.01
params_input_shaper_type_y: 'mzv'
params_input_shaper_freq_y: 33.2
params_input_shaper_damping_ratio_y: 0.01
params_accelerometer: 'adxl345'

[extruder]
step_pin: tool0:gpio23
dir_pin: !tool0:gpio24
enable_pin: !tool0:gpio25
heater_pin: tool0:gpio9
sensor_pin: tool0:gpio29
sensor_type: ATC Semitec 104NT-4-R025H42G
pullup_resistor: 2200
min_temp: 0
max_temp: 300
min_extrude_temp: 170
pressure_advance: 0.055
nozzle_diameter: 0.4
filament_diameter: 1.75
gear_ratio: 9:1
microsteps: 32
full_steps_per_rotation: 200
rotation_distance: 40.086
control: pid
pid_Kp: 27.717
pid_Ki: 3.186
pid_Kd: 60.286


[tmc2209 extruder]
sense_resistor: 0.100
uart_pin: tool0:gpio0
tx_pin: tool0:gpio1
interpolate: false
run_current: 0.90
hold_current: 0.50

[adxl345]
cs_pin: tool0:gpio27
spi_software_sclk_pin: tool0:gpio18
spi_software_mosi_pin: tool0:gpio20
spi_software_miso_pin: tool0:gpio19
axes_map: x,z,y

[resonance_tester]
accel_chip: adxl345
accel_per_hz: 100
sweeping_accel: 400
sweeping_period: 0
probe_points: 150, 150, 20

[fan_generic T0_partfan]
pin: tool0:gpio6
max_power: 1.0
kick_start_time: 0.5
off_below: 0.1

[heater_fan T0_hotend_fan]
pin: tool0:gpio5
heater: extruder
heater_temp: 50.0
kick_start_time: 0.5
## fan_speed: 0.75
