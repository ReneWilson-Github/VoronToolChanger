# ============================
#  T3 - RP2040 / Nitehawk36
# ============================

[mcu tool3]
serial: /dev/serial/by-id/usb-Klipper_rp2040_3232323236199633-if00
restart_method: command

[gcode_macro T3]
variable_active: 0
variable_color: ""
variable_max_fan_power: 1.0
gcode:
    SELECT_TOOL T=3

[tool T3]
tool_number: 3
detection_pin: !tool3:gpio10
extruder: extruder3
fan: T3_partfan
gcode_x_offset: 0.296875
gcode_y_offset: -1.376563
gcode_z_offset: -0.107500
params_park_x: 75.5
params_park_y: 2
params_park_z: 252
params_input_shaper_type_x: '3hump_ei'
params_input_shaper_freq_x: 80.4
params_input_shaper_damping_ratio_x: 0.1
params_input_shaper_type_y: '2hump_ei'
params_input_shaper_freq_y: 86.8
params_input_shaper_damping_ratio_y: 0.1
params_accelerometer: 'adxl345 T3'

[extruder3]
step_pin: tool3:gpio23
dir_pin: !tool3:gpio24
enable_pin: !tool3:gpio25
heater_pin: tool3:gpio9
sensor_pin: tool3:gpio29
sensor_type: ATC Semitec 104NT-4-R025H42G
pullup_resistor: 2200
min_temp: 0
max_temp: 300
min_extrude_temp: 170
nozzle_diameter: 0.4
filament_diameter: 1.75
gear_ratio: 9:1
microsteps: 32
full_steps_per_rotation: 200
rotation_distance: 42.69
control: pid
pid_Kp: 31.440
pid_Ki: 3.677 
pid_Kd: 67.205

[tmc2209 extruder3]
sense_resistor: 0.100
uart_pin: tool3:gpio0
tx_pin: tool3:gpio1
interpolate: false
run_current: 0.650

[adxl345 T3]
cs_pin: tool3:gpio27
spi_software_sclk_pin: tool3:gpio18
spi_software_mosi_pin: tool3:gpio20
spi_software_miso_pin: tool3:gpio19
axes_map: x,z,y

[fan_generic T3_partfan]
pin: tool3:gpio6
max_power: 1.0
kick_start_time: 0.5
off_below: 0.1

[heater_fan T3_hotend_fan]
pin: tool3:gpio5
heater: extruder3
heater_temp: 50.0
kick_start_time: 0.5