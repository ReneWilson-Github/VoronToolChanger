# ============================
#  T4 - RP2040 / Nitehawk36
# ============================

[mcu tool4]
serial: /dev/serial/by-id/usb-Klipper_rp2040_323232323619681A-if00
restart_method: command

[gcode_macro T4]
variable_active: 0
variable_color: ""
variable_max_fan_power: 1.0
gcode:
    SELECT_TOOL T=4

[tool T4]
tool_number: 4
detection_pin: !tool4:gpio10
extruder: extruder4
fan: T4_partfan
gcode_x_offset: -0.193750
gcode_y_offset: -0.576563
gcode_z_offset: 0.148750
params_park_x: 4.2
params_park_y: 1.5
params_park_z: 252
params_input_shaper_type_x: '2hump_ei'
params_input_shaper_freq_x: 81.2
params_input_shaper_damping_ratio_x: 0.1
params_input_shaper_type_y: '2hump_ei'
params_input_shaper_freq_y: 88.2
params_input_shaper_damping_ratio_y: 0.1
params_accelerometer: 'adxl345 T4'

[extruder4]
step_pin: tool4:gpio23
dir_pin: !tool4:gpio24
enable_pin: !tool4:gpio25
heater_pin: tool4:gpio9
sensor_pin: tool4:gpio29
sensor_type: ATC Semitec 104NT-4-R025H42G
pullup_resistor: 2200
min_temp: 0
max_temp: 300
min_extrude_temp: 170
nozzle_diameter: 0.4
filament_diameter: 1.75
gear_ratio: 9:1
microsteps: 32
full_steps_per_rotation: 200
rotation_distance: 46.83
control: pid
pid_Kp: 28.987
pid_Ki: 3.578
pid_Kd: 58.699

[tmc2209 extruder4]
sense_resistor: 0.100
uart_pin: tool4:gpio0
tx_pin: tool4:gpio1
interpolate: false
run_current: 0.900 #0.650 
hold_current: 0.50

[adxl345 T4]
cs_pin: tool4:gpio27
spi_software_sclk_pin: tool4:gpio18
spi_software_mosi_pin: tool4:gpio20
spi_software_miso_pin: tool4:gpio19
axes_map: x,z,y

[fan_generic T4_partfan]
pin: tool4:gpio6
max_power: 1.0
kick_start_time: 0.5
off_below: 0.1

[heater_fan T4_hotend_fan]
pin: tool4:gpio5
heater: extruder4
heater_temp: 50.0
kick_start_time: 0.5
fan_speed: 0.75

