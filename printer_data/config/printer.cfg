#####################################################################
#   VORON Toolchanger printer.cfg
#####################################################################

#####################################################################
#   MCU
#####################################################################

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_2F0033001750344D30353320-if00
restart_method: command

[include mainsail.cfg]
[include toolchanger/readonly-configs/toolchanger-include.cfg]
[include timelapse.cfg]
[input_shaper]
[exclude_object]

#####################################################################
#   Beacon RevH low profile
#####################################################################

[beacon]
serial: /dev/serial/by-id/usb-Beacon_Beacon_RevH_864DEBA35154354D38202020FF0A311A-if00
x_offset: 0
y_offset: 50.8
mesh_main_direction: x
mesh_runs: 2
register_as_probe: True
prefixed_probe_commands: True
default_probe_method: proximity

contact_max_hotend_temperature: 180
contact_sensitivity: 1
home_xy_position: 150, 150

#####################################################################
#   Printer
#####################################################################

[printer]
kinematics: corexy
max_velocity: 600
max_accel: 4000
max_z_velocity: 60
max_z_accel: 800
square_corner_velocity: 5.0

#####################################################################
#   X/Y Stepper Settings
#####################################################################

[stepper_x]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 400
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_min: 0
position_endstop: 299
position_max: 300
homing_speed: 25
homing_retract_dist: 0
homing_positive_dir: true

[tmc2209 stepper_x]
uart_pin: PC4
interpolate: false
run_current: 0.95
sense_resistor: 0.110
stealthchop_threshold: 1
diag_pin: PG6
driver_SGTHRS: 105

[stepper_y]
step_pin: PG0
dir_pin: PG1
enable_pin: !PF15
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 400
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_min: -10
position_endstop: 299
position_max: 300
homing_speed: 25
homing_retract_dist: 0
homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: PD11
interpolate: false
run_current: 0.95
sense_resistor: 0.110
stealthchop_threshold: 1
diag_pin: PG9
driver_SGTHRS: 105

#####################################################################
#   Z Stepper Settings
#####################################################################

[stepper_z]
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32
endstop_pin: probe:z_virtual_endstop
position_max: 280
position_min: -5
homing_speed: 8
second_homing_speed: 3
homing_retract_dist: 0 #was 3

[tmc2209 stepper_z]
uart_pin: PC6
interpolate: false
run_current: 0.95
hold_current: 0.85
sense_resistor: 0.110
stealthchop_threshold: 1

[stepper_z1]
step_pin: PG4
dir_pin: !PC1
enable_pin: !PA0
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z1]
uart_pin: PC7
interpolate: false
run_current: 0.95
hold_current: 0.85
sense_resistor: 0.110
stealthchop_threshold: 1

[stepper_z2]
step_pin: PF9
dir_pin: PF10
enable_pin: !PG2
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z2]
uart_pin: PF2
interpolate: false
run_current: 0.95
hold_current: 0.85
sense_resistor: 0.110
stealthchop_threshold: 1

[stepper_z3]
step_pin: PC13
dir_pin: !PF0
enable_pin: !PF1
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z3]
uart_pin: PE4
interpolate: false
run_current: 0.95
hold_current: 0.85
sense_resistor: 0.110
stealthchop_threshold: 1

#####################################################################
#   Bed Heater
#####################################################################

[heater_bed]
heater_pin: PA1
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PF3
max_power: 0.6
min_temp: 0
max_temp: 120
control: pid
pid_kp: 41.251
pid_ki: 0.972
pid_kd: 437.772

#####################################################################
#   Bed Mesh
#####################################################################

[bed_mesh]
speed: 500
horizontal_move_z: 5
mesh_min: 30, 55
mesh_max: 270, 270
fade_start: 0.6
fade_end: 3.0
probe_count: 25, 25
zero_reference_position: 150, 150
algorithm: bicubic
bicubic_tension: 0.2

#####################################################################
#   Fan Control
#####################################################################

[controller_fan controller_fan]
pin: PD12
kick_start_time: 0.5
heater: heater_bed
fan_speed: 0.5

#####################################################################
#   LED Control
#####################################################################

[output_pin caselight]
pin: PD15
pwm: true
shutdown_value: 0
value: 0
cycle_time: 0.01

#####################################################################
#   Additional Temp Sensors
#####################################################################

[temperature_sensor Octopus]
sensor_type: temperature_mcu
max_temp: 100

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
max_temp: 100

# [temperature_sensor beacon_coil]
# sensor_type: beacon
# max_temp: 80

#####################################################################
#   Homing and Gantry Adjustment
#####################################################################

[idle_timeout]
timeout: 1800

[quad_gantry_level]
gantry_corners:
    -60, -10
    360, 370
points:
    50, 50
    50, 250
    250, 250
    250, 50
speed: 200
horizontal_move_z: 5
retries: 4
retry_tolerance: 0.007
max_adjust: 6

#####################################################################
#   Display
#####################################################################

[board_pins]
aliases:
    EXP1_1=PE8,  EXP1_2=PE7,
    EXP1_3=PE9,  EXP1_4=PE10,
    EXP1_5=PE12, EXP1_6=PE13,
    EXP1_7=PE14, EXP1_8=PE15,
    EXP1_9=<GND>, EXP1_10=<5V>,
    EXP2_1=PA6,  EXP2_2=PA5,
    EXP2_3=PB1,  EXP2_4=PA4,
    EXP2_5=PB2,  EXP2_6=PA7,
    EXP2_7=PC15, EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=<5V>

[display]
lcd_type: uc1701
cs_pin: EXP1_3
a0_pin: EXP1_4
rst_pin: EXP1_5
encoder_pins: ^EXP2_5, ^EXP2_3
click_pin: ^!EXP1_2
contrast: 63
spi_software_miso_pin: EXP2_1
spi_software_mosi_pin: EXP2_6
spi_software_sclk_pin: EXP2_2

[neopixel btt_mini12864]
pin: EXP1_6
chain_count: 3
initial_RED: 1.0
initial_GREEN: 0.0
initial_BLUE: 0.38
color_order: RGB

#####################################################################
#   Macros
#####################################################################

[gcode_macro PRINT_START]
gcode:
    {% set TOOL = params.TOOL | default(0) | int %}
    {% set TOOL_TEMP = params.TOOL_TEMP | default(0) | int %}
    {% set BED_TEMP = params.BED_TEMP | default(0) | int %}
    SET_PIN PIN=caselight VALUE=1.00
    STOP_CRASH_DETECTION
    M117 Heating Bed
    M190 S{BED_TEMP}
    M117 Homing
    G28
    T0
    M117 Quad Gantry Level
    QUAD_GANTRY_LEVEL
    G28 Z
    M117 Bed Mesh
    BED_MESH_CALIBRATE ADAPTIVE=1
    {% if TOOL > 0 %}
        M104 T0 S0
        T{TOOL}
    {% endif %}
    M117 Waiting on T{TOOL} S{TOOL_TEMP}C
    M109 S{TOOL_TEMP}
    M117 Printing

[gcode_macro PRINT_END]
gcode:
    {% set th = printer.toolhead %}
    {% set x_safe = th.position.x + 20 * (1 if th.axis_maximum.x - th.position.x > 20 else -1) %}
    {% set y_safe = th.position.y + 20 * (1 if th.axis_maximum.y - th.position.y > 20 else -1) %}
    {% set z_safe = [th.position.z + 2, th.axis_maximum.z]|min %}
    M220 S100
    M221 S100
    SET_PRESSURE_ADVANCE ADVANCE=0
    G92 E0
    G1 E-2.0 F3600
    M400
    T0
    G90
    G0 X{x_safe} Y{y_safe} Z{z_safe} F20000
    G0 X{th.axis_maximum.x//2} Y{th.axis_maximum.y - 2} F3600
    SET_GCODE_OFFSET X=0.0 Y=0.0 Z=0.0
    {% for tn in printer.toolchanger.tool_numbers %}
        M104 S0 T{tn}
        M107 T{tn}
        SET_STEPPER_ENABLE STEPPER=extruder{tn if tn > 0 else ''} ENABLE=0
    {% endfor %}
    M140 S0
    SET_PIN PIN=caselight VALUE=0.00

